# Drasi Server Configuration for gRPC Test
server:
  host: 0.0.0.0
  port: 8080
  log_level: info  # Override with RUST_LOG environment variable if needed
  disable_persistence: true

server_core:
  priority_queue_capacity: 10000

sources:
  - id: facilities-db
    source_type: grpc
    auto_start: true
    host: 0.0.0.0
    port: 50051

queries:
  - id: building-comfort
    query: |
      MATCH (r:Room)
      RETURN r
    sources:
      - facilities-db
    auto_start: true

reactions:
  - id: rooms-grpc
    reaction_type: grpc
    queries:
      - building-comfort
    auto_start: true
    endpoint: http://127.0.0.1:50052
    batch_size: 1000
    timeout_ms: 5000