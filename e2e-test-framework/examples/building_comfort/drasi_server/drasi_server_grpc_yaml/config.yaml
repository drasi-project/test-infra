# Building Comfort Test Configuration - gRPC Integration
# This configuration demonstrates the E2E Test Framework with gRPC communication
# to a Drasi Server using the Drasi v1 protocol

data_store:
  data_store_path: examples/building_comfort/drasi_server/drasi_server_grpc_yaml/test_data_cache
  delete_on_start: true
  delete_on_stop: true
  test_repos:
    - id: github_dev_repo
      kind: GitHub
      owner: drasi-project
      repo: test-repo
      branch: query-host
      force_cache_refresh: false
      root_path: dev_repo/drasi_server/integration
    - id: local_dev_repo
      kind: LocalStorage
      source_path: examples/building_comfort/drasi_server/drasi_server_grpc_yaml/dev_repo
      local_tests:
        - test_id: building_comfort
          version: 1
          description: ""
          test_folder: building_comfort

          # Source Configuration
          sources:
            - test_source_id: facilities-db
              kind: Model

              # gRPC Source Change Dispatcher
              # Sends changes to Drasi Server via gRPC (Drasi v1 SourceService)
              source_change_dispatchers:
                - kind: Grpc
                  source_id: facilities-db
                  host: localhost
                  port: 50051
                  timeout_seconds: 60
                  batch_events: false
                  tls: false

              # Building Hierarchy Model Generator
              model_data_generator:
                kind: BuildingHierarchy

                # Change timing: [interval_ns, jitter_ns, min_ns, max_ns]
                change_interval: [2000000000, 500000000, 500000000, 4000000000]
                change_count: 1000
                seed: 123456789
                spacing_mode: none
                time_mode: "2025-01-03T10:03:15.4Z"

                # Building structure configuration
                # Format: [mean, std_dev] for normal distribution
                building_count: [1, 0]
                floor_count: [1, 0]
                room_count: [1, 0]

                # Room sensor definitions
                room_sensors:
                  - kind: NormalFloat
                    id: temperature
                    momentum_init: [5, 1, 0.5]
                    value_change: [1, 0]
                    value_init: [5000, 0]
                    value_range: [0, 10000]

                  - kind: NormalFloat
                    id: co2
                    momentum_init: [10, 1, 0.5]
                    value_change: [1, 0]
                    value_init: [5000, 0]
                    value_range: [0, 10000]

                  - kind: NormalFloat
                    id: humidity
                    momentum_init: [5, 1, 0.5]
                    value_change: [1, 0]
                    value_init: [5000, 0]
                    value_range: [0, 10000]

              # Query subscribers
              subscribers:
                - node_id: default
                  query_id: building-comfort

          queries: []

          # Reaction Configuration
          reactions:
            - test_reaction_id: building-comfort

              # gRPC Reaction Handler
              # Implements Drasi v1 ReactionService server
              output_handler:
                kind: Grpc
                host: 0.0.0.0
                port: 50052
                correlation_metadata_key: x-query-sequence
                query_ids:
                  - building-comfort
                include_initial_state: false

              # Stop trigger
              stop_triggers:
                - kind: RecordCount
                  record_count: 1000

# Test Run Configuration
test_run_host:
  test_runs:
    - test_id: building_comfort_grpc
      test_repo_id: github_dev_repo
      test_run_id: test_run_001

      # Source runtime configuration
      sources:
        - test_source_id: facilities-db
          start_mode: auto

      queries: []

      # Reaction runtime configuration
      reactions:
        - test_reaction_id: building-comfort
          start_immediately: true
          output_loggers:
            - kind: PerformanceMetrics
