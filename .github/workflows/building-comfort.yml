name: Building Comfort E2E Test

on:
  push:
    branches:
      - e2e-framework-automation
  workflow_dispatch:
  repository_dispatch:
    types: [building-comfort-trigger]

permissions:
  contents: read
  id-token: write

env:
  CLUSTER_NAME: "building-comfort-aks-${{ github.run_number }}"
  RESOURCE_GROUP_NAME: "project-drasi"

jobs:
  infra:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        
      
      - name: Deploy AKS cluster
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --template-file infra/aks/aks-cluster.bicep \
            --parameters clusterName=${{ env.CLUSTER_NAME }}

  deploy-tests:
    runs-on: ubuntu-latest
    needs: infra
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Deploy building comfort tests
        run: |
          echo "Deploying building comfort E2E tests..."
          # Add test deployment commands here